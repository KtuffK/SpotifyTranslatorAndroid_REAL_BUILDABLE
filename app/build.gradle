plugins {
    id "com.android.application"
}

def autoVersionCode = 600
if (System.getenv("GITHUB_RUN_NUMBER") != null) {
    autoVersionCode = System.getenv("GITHUB_RUN_NUMBER").toInteger() + 600
}

android {
    namespace "com.krisreply.spotifytranslator"
    compileSdk 35

    defaultConfig {
        applicationId "com.krisreply.spotifytranslator"
        minSdk 26
        targetSdk 35
        versionCode autoVersionCode
        versionName "0.9.0"
    }
}
