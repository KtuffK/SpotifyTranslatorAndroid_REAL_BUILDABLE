plugins {
    id "com.android.application"
}

def autoVersionCode = 200
if (System.getenv("GITHUB_RUN_NUMBER") != null) {
    autoVersionCode = System.getenv("GITHUB_RUN_NUMBER").toInteger() + 200
}

android {
    namespace "com.krisreply.spotifytranslator"
    compileSdk 35

    defaultConfig {
        applicationId "com.krisreply.spotifytranslator"
        minSdk 26
        targetSdk 35
        versionCode autoVersionCode
        versionName "0.6.0"
    }

    signingConfigs {
        debug {
            storeFile file("keystore/spotifytranslator-debug.jks")
            storePassword "spotifytranslator"
            keyAlias "spotifytranslator"
            keyPassword "spotifytranslator"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
    }
}
