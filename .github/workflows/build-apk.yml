name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: Verify APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK" || { echo "APK missing"; exit 1; }

          SIZE=$(stat -c%s "$APK")
          echo "APK size: $SIZE bytes"

          if [ "$SIZE" -lt 10000 ]; then
            echo "APK too small to be valid"
            exit 1
          fi

          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyTranslator-full-v2-debug-apk
          path: app/build/outputs/apk/debug/*.apk
